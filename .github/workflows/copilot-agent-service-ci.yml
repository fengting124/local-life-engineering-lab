name: copilot-agent-service CI

on:
  push:
    branches: [main]
    paths:
      - 'copilot-agent-service/**'
      - '.github/workflows/copilot-agent-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'copilot-agent-service/**'
      - '.github/workflows/copilot-agent-service-ci.yml'

concurrency:
  group: copilot-agent-service-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: copilot-agent-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            copilot-agent-service/requirements.txt
            copilot-agent-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Pytest with coverage gate
        env:
          DEBUG: 'false'
        run: |
          python -m pytest -q \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=45

      - name: mutmut mutation gate
        env:
          DEBUG: 'false'
        run: |
          mutmut run
          python scripts/check_mutmut_score.py --min-kill-rate 50 --max-other 0

      - name: Upload coverage and mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-agent-service-quality-reports
          path: |
            copilot-agent-service/coverage.xml
            copilot-agent-service/htmlcov/
            copilot-agent-service/mutants/mutmut-stats.json
            copilot-agent-service/mutants/**/*.meta
          retention-days: 7
