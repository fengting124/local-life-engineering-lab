# local-life-server CI:
# - MySQL/Redis services keep ShardingSphere's localhost-based test config working on GitHub runners.
# - JaCoCo and PIT keep coverage and mutation-quality gates visible before merge.
name: local-life-server CI

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - 'infra/scripts/init-db.sh'
      - '.github/workflows/local-life-server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - 'infra/scripts/init-db.sh'
      - '.github/workflows/local-life-server-ci.yml'

concurrency:
  group: local-life-server-ci-${{ github.ref }}
  cancel-in-progress: true

# Retry only transient Maven artifact downloads, not the whole test/gate command.
env:
  MAVEN_OPTS: >-
    -Daether.connector.http.retryHandler.count=5
    -Daether.connector.http.retryHandler.requestSentEnabled=true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: local_life
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Apply database migrations
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: 123456
          MYSQL_DATABASE: local_life
        run: bash infra/scripts/init-db.sh

      - name: Unit + integration tests with JaCoCo gate
        run: mvn -B -pl local-life-server clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-jacoco
          path: local-life-server/target/site/jacoco/
          retention-days: 7

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-test-reports
          path: |
            local-life-server/target/surefire-reports/
            local-life-server/target/failsafe-reports/
          retention-days: 7

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: local_life
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Apply database migrations
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: 123456
          MYSQL_DATABASE: local_life
        run: bash infra/scripts/init-db.sh

      - name: PIT mutation gate
        run: mvn -B -pl local-life-server test-compile org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-pit
          path: local-life-server/target/pit-reports/
          retention-days: 7
