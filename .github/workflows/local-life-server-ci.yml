name: local-life-server CI

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - '.github/workflows/local-life-server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - '.github/workflows/local-life-server-ci.yml'

concurrency:
  group: local-life-server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit + integration tests with JaCoCo gate
        run: mvn -B -pl local-life-server clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-jacoco
          path: local-life-server/target/site/jacoco/
          retention-days: 7

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-test-reports
          path: |
            local-life-server/target/surefire-reports/
            local-life-server/target/failsafe-reports/
          retention-days: 7

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: PIT mutation gate
        run: mvn -B -pl local-life-server test-compile org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-pit
          path: local-life-server/target/pit-reports/
          retention-days: 7
