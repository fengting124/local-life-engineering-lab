name: local-life-server CI

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - '.github/workflows/local-life-server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'local-life-server/**'
      - '.github/workflows/local-life-server-ci.yml'

concurrency:
  group: local-life-server-ci-${{ github.ref }}
  cancel-in-progress: true

# Maven 解析器 HTTP 重试：吃掉拉取依赖时的瞬时网络抖动（GitHub runner → Maven Central
# 一般很稳，但偶发 5xx / 超时仍会发生）。这里只在「单个构件下载」层面重试，不重跑测试或
# 质量门禁——所以真正的用例失败 / 覆盖率门禁不达标不会被错误地反复重试。
# 注意：不在 CI 里用 Docker 那套阿里云镜像——GitHub runner 在海外，直连 Maven Central
# 才是最快最稳的；阿里云镜像是给本地 Docker Desktop（国内网络）用的。
env:
  MAVEN_OPTS: >-
    -Daether.connector.http.retryHandler.count=5
    -Daether.connector.http.retryHandler.requestSentEnabled=true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit + integration tests with JaCoCo gate
        run: mvn -B -pl local-life-server clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-jacoco
          path: local-life-server/target/site/jacoco/
          retention-days: 7

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-test-reports
          path: |
            local-life-server/target/surefire-reports/
            local-life-server/target/failsafe-reports/
          retention-days: 7

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: PIT mutation gate
        run: mvn -B -pl local-life-server test-compile org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-life-server-pit
          path: local-life-server/target/pit-reports/
          retention-days: 7
