# ================================================================
# LocalLife × Copilot — Nginx 反向代理配置
#
# 架构：
#   用户 → Nginx (:80/:443) → 路由到各服务
#     /api/v1/*    → LocalLife Server (:8080)  Java 主业务 API
#     /mcp         → Copilot MCP Server (:8081)  MCP 工具接口（内网，不对外）
#     /chat        → Agent Service (:8000)  Copilot 对话 + SSE
#     /sessions    → Agent Service (:8000)
#     /hitl        → Agent Service (:8000)
#     /metrics     → Agent Service (:8000)
#     /docs        → Agent Service (:8000)  Swagger
#     /            → Agent Service (:8000)  Chat UI 静态文件
#
# 开发环境直接用（HTTP only）：
#   docker compose -f docker-compose.dev.yml --profile nginx up -d
#
# 生产环境（HTTPS）：
#   1. 填写 ssl_certificate / ssl_certificate_key 路径
#   2. 启用 server 块中的 HTTPS 配置（当前注释掉）
# ================================================================

events {
    worker_connections 1024;
}

http {
    # ── 基础设置 ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── 日志格式 ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── 上游服务 ──
    upstream locallife_server {
        server locallife-server:8080;
        # 生产可加多实例：server locallife-server-2:8080;
        keepalive 32;
    }

    upstream agent_service {
        server copilot-agent-service:8000;
        keepalive 16;
    }

    # ── SSE / 流式响应关键配置 ──
    # SSE（Server-Sent Events）需要关闭缓冲，否则浏览器收不到实时推送
    proxy_buffering       off;
    proxy_cache           off;
    proxy_read_timeout    300s;   # Agent 推理可能需要几十秒
    proxy_send_timeout    300s;
    proxy_http_version    1.1;
    proxy_set_header      Connection "";   # keep-alive 对 SSE 必须
    proxy_set_header      Host $host;
    proxy_set_header      X-Real-IP $remote_addr;
    proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $scheme;

    # ── HTTP Server ──
    server {
        listen 80;
        server_name localhost;   # 生产替换为真实域名，如 copilot.example.com

        # 安全头
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # ── LocalLife 主 API ──
        location /api/ {
            proxy_pass http://locallife_server;
            # LocalLife Server 的响应通常很快，可以保持缓冲
            proxy_buffering on;
        }

        # ── Actuator（运维，生产建议限制 IP 访问）──
        location /actuator/ {
            proxy_pass http://locallife_server;
            # 生产：只允许内网访问
            # allow 10.0.0.0/8;
            # deny all;
        }

        # ── Copilot Chat（SSE 流式输出，必须关闭缓冲）──
        location /chat {
            proxy_pass http://agent_service;
            # SSE 专用设置
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            # 告诉 Nginx 不要给 SSE 响应加缓冲
            add_header X-Accel-Buffering no;
        }

        # ── Copilot 其他 API ──
        location ~ ^/(sessions|hitl|metrics|health|docs|openapi.json) {
            proxy_pass http://agent_service;
        }

        # ── 静态文件（Chat UI + Approval UI）──
        location / {
            proxy_pass http://agent_service;
            # 静态文件可以开缓冲
            proxy_buffering on;
            proxy_cache_valid 200 10m;   # 静态文件缓存 10 分钟
        }

        # ── 健康检查（负载均衡器用）──
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS Server（生产环境取消注释）──
    # server {
    #     listen 443 ssl http2;
    #     server_name copilot.example.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # 其余 location 块与 HTTP server 相同（复制过来）
    #     # ...
    # }
    #
    # # HTTP → HTTPS 重定向
    # server {
    #     listen 80;
    #     server_name copilot.example.com;
    #     return 301 https://$host$request_uri;
    # }
}
