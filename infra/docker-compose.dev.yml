services:

  # =========================================================
  # 应用服务（需要先 build image）
  # 启动方式：docker compose --profile app up -d
  # =========================================================

  nginx:
    image: nginx:1.27-alpine
    container_name: local-life-nginx
    profiles: ["nginx"]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      copilot-agent:
        condition: service_healthy
      locallife-server:
        condition: service_healthy
    networks:
      - local-life-net
    restart: unless-stopped

  # DB 迁移 Init Container（仅执行一次后退出）
  db-init:
    image: mysql:8.4
    container_name: local-life-db-init
    profiles: ["app"]
    volumes:
      - ../local-life-server/src/main/resources/db/migration:/migrations/server:ro
      - ../local-life-copilot/src/main/resources/db/migration:/migrations/copilot:ro
      - ./scripts/init-db.sh:/init-db.sh:ro
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: local_life
    entrypoint: ["bash", "/init-db.sh"]
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - local-life-net
    restart: "no"   # 执行完即退出，不重启

  locallife-server:
    build:
      context: ..
      dockerfile: local-life-server/Dockerfile
    image: locallife-server:latest
    container_name: local-life-server
    profiles: ["app"]
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # 使用 Docker 网络内部地址访问 MySQL/Redis
      SPRING_DATASOURCE_URL: "jdbc:shardingsphere:classpath:sharding-docker.yaml"
      # ShardingSphere 内的 jdbcUrl 需要指向 Docker 网络中的 MySQL
      # 通过 JAVA_OPTS 传入，覆盖 sharding.yaml 的默认 localhost
      # ShardingSphere 读取 MYSQL_HOST 等系统属性（见 sharding.yaml 的 ${MYSQL_HOST:-localhost}）
      JAVA_OPTS: >-
        -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
        -DMYSQL_HOST=mysql
        -DMYSQL_PORT=3306
        -DMYSQL_USER=root
        -DMYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
        -Dspring.data.redis.host=redis
        -Dspring.elasticsearch.uris=http://elasticsearch:9200
        -Drocketmq.name-server=rocketmq-namesrv:9876
        -Dmanagement.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
        -Dinternal.api-key=${INTERNAL_API_KEY:-local-life-internal-secret}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - local-life-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  locallife-copilot:
    build:
      context: ..
      dockerfile: local-life-copilot/Dockerfile
    image: locallife-copilot:latest
    container_name: local-life-copilot
    profiles: ["app"]
    ports:
      - "${COPILOT_PORT:-8081}:8081"
    environment:
      JAVA_OPTS: >-
        -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
        -Dspring.datasource.url=jdbc:mysql://mysql:3306/local_life?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
        -Dspring.datasource.username=root
        -Dspring.datasource.password=${MYSQL_ROOT_PASSWORD:-123456}
        -Dspring.data.redis.host=redis
        -Dspring.data.redis.database=1
        -Dlocallife.server.url=http://locallife-server:8080
        -Dlocallife.server.internal-key=${INTERNAL_API_KEY:-local-life-internal-secret}
    depends_on:
      locallife-server:
        condition: service_healthy
    networks:
      - local-life-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  copilot-agent:
    build:
      context: ../copilot-agent-service
      dockerfile: Dockerfile
    image: copilot-agent:latest
    container_name: copilot-agent-service
    profiles: ["app"]
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      MCP_SERVER_URL: "http://locallife-copilot:8081"
      DB_URL: "mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-123456}@mysql:3306/local_life"
      REDIS_URL: "redis://redis:6379/2"
      MILVUS_URI: "http://milvus:19530"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-6}"
      DEBUG: "false"
    depends_on:
      locallife-copilot:
        condition: service_healthy
    networks:
      - local-life-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: local-life-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-local_life}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # 开启 binlog（ROW 格式），是 Canal 订阅变更事件的前提——
      # Canal Server 把自己伪装成 MySQL 的"从库"，通过 dump 协议拉取 binlog 并解析；
      # ROW 格式记录每一行变更前后的完整数据（而不是 STATEMENT 格式记录 SQL 语句），
      # Canal 才能精确提取出"哪一行的哪个字段变成了什么值"。
      # server-id 是从库在主从复制中的唯一标识，必须显式指定且与潜在的其他从库不冲突。
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - local-life-net

  redis:
    image: redis:7.4-alpine
    container_name: local-life-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - local-life-net

  elasticsearch:
    # 自定义镜像：内置 IK 中文分词插件（见 infra/elasticsearch/Dockerfile）
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: local-life-es:8.17.3-ik
    container_name: local-life-es
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "${ELASTIC_PORT:-9200}:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - local-life-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: local-life-rmq-namesrv
    profiles: ["mq"]
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    command: sh mqnamesrv
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    networks:
      - local-life-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: local-life-rmq-broker
    profiles: ["mq"]
    depends_on:
      - rocketmq-namesrv
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      # WSL 内存有限（7.4GB），限制 broker JVM 堆为 512MB，避免 OOM Killed (exit 137)
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    networks:
      - local-life-net

  # =========================================================
  # Canal Server：订阅 MySQL binlog，驱动门店缓存失效
  # 启动方式：docker compose --profile canal up -d
  # 用途详见 ShopService 类注释「缓存一致性：从延迟双删到 Canal+binlog」
  # 与 ShopCacheInvalidationListener（应用内的瘦客户端消费者）。
  #
  # 工作原理：Canal Server 把自己伪装成 MySQL 的"从库"，通过 dump 协议
  # 拉取并解析 binlog（前提：mysql 服务已开启 --log-bin --binlog-format=ROW），
  # 再通过 TCP 协议把解析好的行级变更事件推送给下游的瘦客户端
  # （应用内的 ShopCacheInvalidationListener，通过 canal.client SDK 连接）。
  #
  # 默认关闭（profile=canal，不在 app/dev 默认启动范围内）：
  # 这是一个需要独立运维的中间件，本地开发不强制要求；
  # ShopCacheInvalidationListener 在 canal.enabled=false 时也不会报错——
  # 此时缓存一致性退化为「写 DB 前同步删缓存 + 30min TTL 兜底」，业务仍然正确。
  # =========================================================
  canal-server:
    image: canal/canal-server:v1.1.8
    container_name: local-life-canal-server
    profiles: ["canal"]
    depends_on:
      - mysql
    environment:
      # canal.instance.master.address：要订阅的 MySQL 地址（同一 compose 网络内用服务名访问）
      canal.instance.master.address: mysql:3306
      # 必须与 MySQL 账号匹配——该账号需要 REPLICATION SLAVE / REPLICATION CLIENT 权限
      # （开发环境直接复用 root，生产环境应该建专用的最小权限 dump 账号）
      canal.instance.dbUsername: root
      canal.instance.dbPassword: ${MYSQL_ROOT_PASSWORD:-123456}
      # canal instance 名称，需要和 application.yml 里的 canal.destination 一致
      canal.destination: local_life
      # 只订阅 shop 表，减少无关 binlog 事件的解析与转发开销
      canal.instance.filter.regex: local_life\\.shop
    ports:
      - "${CANAL_PORT:-11111}:11111"
    networks:
      - local-life-net

  # =========================================================
  # 可观测性套件：Prometheus + Grafana + Zipkin
  # 启动方式：docker compose --profile observability up -d
  # =========================================================

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: local-life-prometheus
    profiles: ["observability"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - local-life-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: local-life-grafana
    profiles: ["observability"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - local-life-net

  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: local-life-zipkin
    profiles: ["observability"]
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    environment:
      STORAGE_TYPE: mem   # 开发用内存存储，生产用 ES/Cassandra
    networks:
      - local-life-net

  # =========================================================
  # Milvus 向量库（RAG 必需）
  # 启动方式：docker compose --profile rag up -d
  # =========================================================

  # Milvus 依赖 etcd 和 MinIO
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: local-life-etcd
    profiles: ["rag"]
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    networks:
      - local-life-net

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: local-life-minio
    profiles: ["rag"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - local-life-net

  milvus:
    image: milvusdb/milvus:v2.4.16
    container_name: local-life-milvus
    profiles: ["rag"]
    ports:
      - "${MILVUS_PORT:-19530}:19530"   # Milvus 主端口
      - "9091:9091"                      # Milvus 监控端口
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    networks:
      - local-life-net

  attu:   # Milvus Web UI（类似 Adminer for Milvus）
    image: zilliz/attu:v2.4.10
    container_name: local-life-attu
    profiles: ["rag"]
    ports:
      - "${ATTU_PORT:-3001}:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus
    networks:
      - local-life-net

  # =========================================================
  # 本地模型服务（RAG 必需）
  # 启动方式：docker compose --profile rag up -d embedding-service reranker-service
  # 模型文件共享至 model-cache volume（首次启动时自动下载，约 2GB）
  # =========================================================

  embedding-service:
    build:
      context: ../copilot-agent-service/model_services/embedding_service
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
    image: local-life-embedding:latest
    container_name: local-life-embedding
    user: root
    profiles: ["rag"]
    ports:
      - "${EMBEDDING_PORT:-8100}:8100"
    environment:
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-intfloat/multilingual-e5-base}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-auto}
      MODEL_CACHE_DIR: /models
      MAX_BATCH_SIZE: ${MAX_BATCH_SIZE:-64}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-2048}
      EMBEDDING_NORMALIZE: ${EMBEDDING_NORMALIZE:-true}
      HF_ENDPOINT: https://huggingface.co
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    volumes:
      - model-cache:/models
    networks:
      - local-life-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  reranker-service:
    build:
      context: ../copilot-agent-service/model_services/reranker_service
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
    image: local-life-reranker:latest
    container_name: local-life-reranker
    user: root
    profiles: ["rag"]
    ports:
      - "${RERANKER_PORT:-8101}:8101"
    environment:
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-BAAI/bge-reranker-base}
      RERANKER_DEVICE: ${RERANKER_DEVICE:-auto}
      MODEL_CACHE_DIR: /models
      MAX_DOCUMENTS: ${MAX_DOCUMENTS:-50}
      MAX_QUERY_LENGTH: ${MAX_QUERY_LENGTH:-512}
      MAX_DOCUMENT_LENGTH: ${MAX_DOCUMENT_LENGTH:-2048}
      HF_ENDPOINT: https://huggingface.co
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    volumes:
      - model-cache:/models
    networks:
      - local-life-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8101/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  mysql_data:
  redis_data:
  elastic_data:
  prometheus_data:
  grafana_data:
  etcd_data:
  minio_data:
  milvus_data:
  model-cache:  # 共享模型缓存：embedding-service 和 reranker-service 复用同一个 /models 目录

networks:
  local-life-net:
    driver: bridge
