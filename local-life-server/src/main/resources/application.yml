spring:
  application:
    name: local-life-server

  # ===== 数据源配置（ShardingSphere 接管）=====
  datasource:
    # ShardingSphere Driver 接管 JDBC 层，透明拦截所有 SQL 并按分片规则路由。
    # 配置格式：jdbc:shardingsphere:classpath:{分片配置文件路径}
    # 分片规则详见 src/main/resources/sharding.yaml：
    #   - order_info → order_info_{0..3}（按 user_id % 4 路由）
    #   - 其他表（user / shop / post 等）→ 直接透传到底层 MySQL，不做分片
    # 面试说法："数据源层用 ShardingSphere Driver，MyBatis-Plus 和 Spring 无需任何改动，
    #   分片逻辑对上层完全透明。"
    url: jdbc:shardingsphere:classpath:sharding.yaml
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # username / password：在 sharding.yaml 的 dataSources.ds0 中配置，此处不再重复。
    # Spring Boot 自动配置允许只配 url + driver，不强制要求 username/password（ShardingSphere 内部管理连接池）。

  # ===== Redis 配置 =====
  data:
    redis:
      host: localhost
      port: 6379
      # password:       # 当前开发环境 Redis 无密码，生产环境必须设置
      database: 0       # 使用 DB 0，不同业务域可以切换不同 database 隔离
      timeout: 3000ms   # 命令执行超时时间，超过后抛 RedisCommandTimeoutException
      lettuce:
        pool:
          max-active: 16    # 连接池最大活跃连接数，根据并发量调整
          max-idle: 8       # 最大空闲连接数
          min-idle: 2       # 最小保持的空闲连接数，避免冷启动延迟
          max-wait: 1000ms  # 连接池耗尽时最大等待时间，超过后抛异常

  # ===== Jackson JSON 序列化配置 =====
  jackson:
    # 时间格式：ISO 8601 含时区，与接口规范文档一致
    date-format: "yyyy-MM-dd'T'HH:mm:ssXXX"
    time-zone: Asia/Shanghai
    # Long 型数字超过 JS 安全整数范围（2^53-1）会被截断
    # 统一将 Long 序列化为字符串，前端接收后按字符串处理
    serialization:
      write-dates-as-timestamps: false
    # 接口返回时不序列化 null 字段（减少响应体积），
    # 如有特殊需求，在具体 VO 上用 @JsonInclude(JsonInclude.Include.ALWAYS) 覆盖
    default-property-inclusion: non_null

# ===== Elasticsearch 配置 =====
spring.elasticsearch:
  # ES 节点地址（docker-compose 中 xpack.security.enabled=false，直接 http）
  uris: http://localhost:9200
  # 连接/读取超时时间（毫秒），ES 单次查询一般 < 100ms，给 3s 余量
  connection-timeout: 3000ms
  socket-timeout: 3000ms

# ===== RocketMQ 配置 =====
rocketmq:
  # Name Server 地址，对应 docker-compose rocketmq-namesrv:9876
  # 开发环境连本地，生产环境用 VIP 地址（逗号分隔多个节点）
  name-server: localhost:9876
  producer:
    # 生产者组名，同一业务的 Producer 用同一 Group（事务消息需要同组重试）
    group: local-life-producer-group
    # 消息发送超时（毫秒），超过后抛 RemotingTooMuchRequestException
    send-message-timeout: 3000
    # 消息发送失败重试次数（不含第一次）
    retry-times-when-send-failed: 2
  consumer:
    # 消费者组，同一业务的 Consumer 用同一 Group（实现负载均衡和集群消费）
    group: local-life-consumer-group

# ===== MyBatis-Plus 配置 =====
mybatis-plus:
  # Mapper XML 文件位置，* 通配符匹配所有 XML
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类所在包，MyBatis-Plus 自动扫描，配合 @TableName 注解使用
  type-aliases-package: com.personalprojections.locallife.server.domain.entity
  configuration:
    # 开启驼峰命名自动映射：
    #   数据库列名 user_id  ←→  Java 字段名 userId
    map-underscore-to-camel-case: true
    # 开发环境打印 SQL，方便调试；生产环境建议关闭或改为 WARN 级别
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：ASSIGN_ID 使用雪花算法生成 Long 型 ID，不依赖数据库自增
      # 雪花 ID 特点：趋势递增、全局唯一、不需要中心节点
      id-type: assign_id
      # 逻辑删除字段名，对应数据库列 deleted（0=未删除，1=已删除）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== 服务端口 =====
server:
  port: 8080
  servlet:
    # 暂不设 context-path，保持 /api/v1/... 的路径直接可用
    context-path: /

# ===== Actuator 运维端点 =====
management:
  endpoints:
    web:
      exposure:
        # 暴露 health、info、prometheus 端点
        # prometheus：暴露 /actuator/prometheus，Prometheus Server 定期抓取此端点收集指标
        # 生产环境需要配合安全认证，防止端点被外部访问
        include: health,info,prometheus
  endpoint:
    health:
      # always：无论是否健康都返回详情，方便开发调试
      # 生产环境建议改为 when-authorized
      show-details: always
    prometheus:
      # 暴露 Prometheus 格式的 metrics 数据
      # 访问：GET /actuator/prometheus
      # Spring Boot 3.4+ 用 access: unrestricted 替代已废弃的 enabled: true
      access: unrestricted

  # ===== Micrometer Metrics 配置 =====
  metrics:
    tags:
      # 为所有 metrics 添加 application 标签，Prometheus 多服务时用于区分
      # 示例：http_server_requests_seconds_count{application="local-life-server", ...}
      application: ${spring.application.name}
    distribution:
      # HTTP 请求时间分布（用于 P99 延迟分析）
      # 开启 SLO 百分位数直方图：记录 50ms/100ms/200ms/500ms/1s/2s/5s 的请求分布
      # Prometheus 中使用 histogram_quantile(0.99, ...) 计算 P99 延迟
      # 键名含点号，用 [] 包裹避免 YAML 解析歧义
      percentiles-histogram:
        "[http.server.requests]": true
      # 预定义 SLO 边界（Service Level Objective）：用于检查接口是否满足响应时间要求
      # 示例：99% 的请求 < 500ms 为达标（通过 Grafana 面板展示）
      slo:
        "[http.server.requests]": 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s

  # ===== 分布式链路追踪（Micrometer Tracing + Brave + Zipkin）=====
  tracing:
    # 采样率：1.0 = 100% 采样（所有请求都生成 Trace）
    # 开发环境用 1.0，方便排查问题
    # 生产环境建议 0.1（10% 采样），减少 Zipkin 存储和网络开销
    sampling:
      probability: 1.0

  # ===== Zipkin 上报配置（与 management 同级，合并在此块内）=====
  # Spring Boot 3.x Zipkin 配置路径：management.zipkin.tracing（原 spring.zipkin 已废弃）
  # ZipkinReporter 将 Span 数据 POST 到：http://localhost:9411/api/v2/spans
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans


# ===== 内部服务接口密钥（Copilot MCP Server 调用用）=====
# 生产环境从 Secret Manager 注入，不要硬编码到代码仓库
internal:
  api-key: local-life-internal-secret

# ===== 日志配置 =====
logging:
  level:
    # 业务代码日志级别：开发阶段用 DEBUG，方便追踪请求链路
    com.personalprojections.locallife: DEBUG
    # MyBatis SQL 日志：DEBUG 时打印完整 SQL 和参数
    com.personalprojections.locallife.server.mapper: DEBUG
    # Spring 框架日志：INFO 级别，避免刷屏
    org.springframework: INFO
  pattern:
    # 日志格式：时间 + 级别 + 线程 + 类名 + 消息
    # %X{traceId} 和 %X{spanId}：Micrometer Tracing 自动写入 MDC，
    # 同一请求链路的所有日志行都有相同 traceId，方便日志聚合和问题定位
    # 示例：grep traceId=abc123 application.log  → 找出该请求的完整链路日志
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] [%thread] [%X{traceId}/%X{spanId}] %logger{36} - %msg%n"
