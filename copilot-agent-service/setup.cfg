# mutmut 变异测试配置（仅 [mutmut] 段；本项目其余工具不读 setup.cfg）。
#
# 变异测试衡量「测试有效性」：mutmut 把被测源码逐处改坏（== 改 !=、and 改 or、删分支…），
# 每个变异跑一遍测试——测试挂掉=变异被「杀死」（好）；测试仍绿=变异「存活」（测试盲区）。
# 杀死率比覆盖率更能说明测试到底有没有在「断言行为」而不只是「执行到了」。
#
# 只挑两个纯逻辑、单测 100% 覆盖的模块做演示（跑得快、可重复）：
#   - agent/tool_router.py     RBAC 过滤 + 任务路由 + 并发安全分级
#   - guardrails/input_checker.py  Prompt 注入防护
#
# 运行：
#   pip install -r requirements-dev.txt
#   mutmut run            # 跑变异
#   mutmut results        # 看存活/被杀清单
#   mutmut html           # 生成 HTML 报告
[mutmut]
paths_to_mutate=
    agent/tool_router.py
    guardrails/input_checker.py
tests_dir=
    tests/test_tool_router.py
    tests/test_guardrails.py
also_copy=
    agent/__init__.py
    guardrails/__init__.py
    pytest.ini
